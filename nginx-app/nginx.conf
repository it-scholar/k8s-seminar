worker_processes auto;

# Write pid to /tmp so the nginx user can write without root
pid /tmp/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Do not advertise nginx version in headers or error pages
    server_tokens off;

    # Redirect all temp-file writes to /tmp (writable by non-root)
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # Limit request body size to reduce DoS risk
    client_max_body_size 1m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    server {
        # Listen on a non-privileged port so the process can run as non-root
        listen 8080;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Frame-Options           "DENY"                              always;
        add_header X-Content-Type-Options    "nosniff"                           always;
        add_header X-XSS-Protection          "1; mode=block"                     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
        add_header Content-Security-Policy   "default-src 'self'"                always;
        add_header Permissions-Policy        "geolocation=(), microphone=()"     always;

        location / {
            try_files $uri $uri/ =404;
        }

        # Block hidden files (e.g. .git, .env)
        location ~ /\. {
            deny all;
        }
    }
}
