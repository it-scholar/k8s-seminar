apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "joke-application.fullname" . }}-backend
  labels:
    {{- include "joke-application.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "joke-application.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "joke-application.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # CNPG creates the secret <clusterName>-app containing jdbc-uri, user, password
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "joke-application.dbSecretName" . }}
                  key: jdbc-uri
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "joke-application.dbSecretName" . }}
                  key: user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "joke-application.dbSecretName" . }}
                  key: password
          readinessProbe:
            httpGet:
              path: /api/jokes
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/jokes
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
