apiVersion: v1
kind: Service
metadata:
  name: {{ include "joke-application.fullname" . }}-frontend
  labels:
    {{- include "joke-application.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "joke-application.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.frontend.service.port }}
      targetPort: http
